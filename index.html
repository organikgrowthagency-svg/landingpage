    <!-- Google Fonts: Playfair Display, Plus Jakarta Sans, & Poppins (for the vector logo) -->

    <script>

            theme: {

                        brandCharcoal: '#2D2F31',

                        brandCream: '#FAF9F6',
                        brandCreamDarker: '#F3F1EC',

                        brandMuted: '#525457'

                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        poppins: ['"Poppins"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* Modern minimalist custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF9F6;
        }
        ::-webkit-scrollbar-thumb {
            background: #2D2F31;
            border-radius: 4px;
        }
        /* Style for radio button selected states */
        input[type="radio"]:checked + label {
            border-color: #4A723B;
            background-color: rgba(74, 114, 59, 0.04);

        }
        input[type="radio"]:checked + label .radio-dot {
            border-color: #4A723B;
            background-color: #4A723B;
        }
    </style>
</head>
